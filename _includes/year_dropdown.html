<div class="btn-group">
  <button
    type="button"
    class="btn btn-light btn-lg dropdown-toggle"
    data-toggle="dropdown"
    aria-haspopup="true"
    aria-expanded="false"
  >
    Year
  </button>
  <div class="dropdown-menu">
    <a class="dropdown-item" href="{{ '/' | relative_url }}"
      ><strong>All</strong></a
    >
    <div class="dropdown-divider"></div>

    {% assign seasons = site.data.seasons | sort %} {% for season_hash in
    seasons reversed %} {% assign year_key = season_hash[0] %}
    <a
      class="dropdown-item"
      href="{{ '/season/' | append: year_key | append: '.html' | relative_url }}"
    >
      {{ year_key }}
    </a>
    {% endfor %}
  </div>
</div>
